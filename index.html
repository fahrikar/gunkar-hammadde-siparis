<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gülgün Sipariş" />
<meta name="theme-color" content="#10151C" />
<title>Gülgün Süt · Sipariş</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

<style>
  :root{
    --ink:#10151C; --surface:#FFFFFF; --paper:#F2F4F7;
    --line:#E2E6EC; --muted:#64707F; --brand:#1B4DD1;
    --yeni:#E8930C; --onay:#1F9D57; --beklet:#64707F; --ret:#DC3B3B;
    --radius:14px; --shadow:0 1px 2px rgba(16,21,28,.06),0 8px 24px rgba(16,21,28,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 120px}

  /* Header */
  .top{display:flex;align-items:center;gap:12px;padding:18px 4px 22px}
  .mark{
    width:40px;height:40px;border-radius:10px;background:var(--ink);color:#fff;
    display:grid;place-items:center;font-family:Archivo,sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;flex:0 0 auto;
  }
  .top h1{font-family:Archivo,sans-serif;font-weight:800;font-size:19px;letter-spacing:-.4px;margin:0;line-height:1.1}
  .top .sub{font-size:12.5px;color:var(--muted);margin-top:2px;letter-spacing:.2px}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .sec-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:26px 4px 10px}

  /* Product rows */
  .prod{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .prod:last-child{border-bottom:0}
  .prod .name{flex:1;font-weight:600;font-size:15.5px}
  .prod .unit{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
  .stepper{display:flex;align-items:center;gap:2px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:3px}
  .stepper button{
    width:38px;height:38px;border:0;background:transparent;border-radius:8px;font-size:22px;color:var(--ink);
    font-family:Inter,sans-serif;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .12s;
  }
  .stepper button:active{background:#e6eaf0}
  .stepper input{
    width:52px;text-align:center;border:0;background:transparent;font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:16px;color:var(--ink);-moz-appearance:textfield;
  }
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .prod.active{background:#fbfcfe}
  .prod.active .stepper{border-color:var(--brand);background:#fff}

  /* Note */
  textarea{
    width:100%;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);
    padding:14px 16px;font-family:Inter,sans-serif;font-size:15px;color:var(--ink);resize:vertical;min-height:88px;box-shadow:var(--shadow);
  }
  textarea:focus{outline:none;border-color:var(--brand)}
  textarea::placeholder{color:#9aa4b1}

  /* Sticky submit */
  .bar{
    position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,var(--paper) 62%,transparent);
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
  }
  .bar .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .total{flex:1;line-height:1.15}
  .total .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px}
  .total .l{font-size:12px;color:var(--muted)}
  .btn{
    border:0;border-radius:13px;font-family:Archivo,sans-serif;font-weight:700;font-size:15.5px;letter-spacing:.2px;
    padding:15px 22px;cursor:pointer;transition:transform .06s,opacity .15s;color:#fff;background:var(--brand);
  }
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:10px 14px;font-size:13.5px;border-radius:10px}

  /* Confirmation */
  .done{text-align:center;padding:54px 24px}
  .done .tick{width:64px;height:64px;border-radius:50%;background:var(--onay);color:#fff;display:grid;place-items:center;margin:0 auto 18px;font-size:30px}
  .done h2{font-family:Archivo,sans-serif;font-weight:800;font-size:22px;margin:0 0 6px}
  .done p{color:var(--muted);margin:0 0 24px;font-size:14.5px}
  .receipt{text-align:left;margin:0 0 24px}
  .receipt .row{display:flex;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14.5px}
  .receipt .row:last-child{border-bottom:0}
  .receipt .row .q{font-family:'JetBrains Mono',monospace;font-weight:700}

  /* ===== Admin ===== */
  .gate{max-width:360px;margin:12vh auto 0;padding:0 20px;text-align:center}
  .gate .mark{margin:0 auto 18px;width:52px;height:52px;font-size:22px;border-radius:13px}
  .gate h2{font-family:Archivo,sans-serif;font-weight:800;margin:0 0 22px}
  .gate input{width:100%;border:1px solid var(--line);border-radius:13px;padding:15px 16px;font-size:16px;font-family:Inter;text-align:center;margin-bottom:12px}
  .gate input:focus{outline:none;border-color:var(--brand)}

  .adminhead{display:flex;align-items:center;justify-content:space-between;padding:18px 4px 14px;gap:10px}
  .adminhead h1{font-family:Archivo,sans-serif;font-weight:800;font-size:18px;margin:0}
  .adminhead .cnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .pushnote{display:flex;gap:10px;align-items:center;background:#FFF7E9;border:1px solid #F3DBA6;color:#8a5a00;border-radius:12px;padding:12px 14px;font-size:13px;margin:0 4px 16px;line-height:1.3}
  .pushnote button{margin-left:auto;flex:0 0 auto}

  .filters{display:flex;gap:8px;padding:0 4px 14px;overflow-x:auto}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .ticket{position:relative;overflow:hidden;margin-bottom:14px;padding:16px 16px 16px 20px;animation:slidein .32s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.ticket{animation:none}}
  .ticket .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .ticket.yeni .stripe{background:var(--yeni)} .ticket.onaylandi .stripe{background:var(--onay)}
  .ticket.beklemede .stripe{background:var(--beklet)} .ticket.reddedildi .stripe{background:var(--ret)}
  .thead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .oid{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--ink)}
  .otime{font-size:12px;color:var(--muted)}
  .badge{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:6px}
  .badge.yeni{background:#FDEFD6;color:#9a6200} .badge.onaylandi{background:#DEF3E7;color:#137a41}
  .badge.beklemede{background:#eceef1;color:#4a5563} .badge.reddedildi{background:#fbe0e0;color:#a82a2a}
  .lines{border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:0 0 10px}
  .line{display:flex;justify-content:space-between;padding:9px 2px;font-size:14.5px;border-bottom:1px dashed var(--line)}
  .line:last-child{border-bottom:0}
  .line .q{font-family:'JetBrains Mono',monospace;font-weight:700}
  .onote{font-size:13.5px;color:var(--muted);background:var(--paper);border-radius:9px;padding:10px 12px;margin-bottom:12px;line-height:1.4}
  .onote b{color:var(--ink);font-weight:600}
  .acts{display:flex;gap:8px}
  .acts .btn{flex:1}
  .btn.onay{background:var(--onay)} .btn.beklet{background:var(--beklet)} .btn.ret{background:var(--surface);color:var(--ret);border:1px solid #f0cccc}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14.5px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;box-shadow:var(--shadow);z-index:50;max-width:88vw;text-align:center}

  .footlink{text-align:center;margin:34px 0 0}
  .footlink a{color:#9aa4b1;font-size:12px;text-decoration:none;letter-spacing:.03em}
  .hide{display:none!important}
</style>
</head>
<body>

<!-- ============ MÜŞTERİ: SİPARİŞ EKRANI ============ -->
<div id="orderView" class="wrap">
  <div class="top">
    <div class="mark">G</div>
    <div>
      <h1>Gülgün Süt · Sipariş</h1>
      <div class="sub">Günkar Ambalaj — karton koli</div>
    </div>
  </div>

  <div class="sec-label">Ürünler</div>
  <div class="card" id="prodList"><!-- js --></div>

  <div class="sec-label">Sipariş notu</div>
  <textarea id="orderNote" placeholder="Teslim tarihi, baskı, palet düzeni… (opsiyonel)"></textarea>

  <div class="footlink"><a href="?admin=1">Yönetim girişi</a></div>
</div>

<div id="orderBar" class="bar">
  <div class="inner">
    <div class="total">
      <div class="n"><span id="totQty">0</span> koli</div>
      <div class="l"><span id="totLines">0</span> ürün seçildi</div>
    </div>
    <button class="btn" id="sendBtn" disabled onclick="siparisGonder()">Siparişi gönder</button>
  </div>
</div>

<!-- ============ MÜŞTERİ: ONAY EKRANI ============ -->
<div id="doneView" class="wrap hide">
  <div class="done">
    <div class="tick">✓</div>
    <h2>Siparişiniz iletildi</h2>
    <p>Günkar Ambalaj siparişinizi aldı ve inceliyor.</p>
    <div class="card receipt" id="receipt"></div>
    <button class="btn ghost" onclick="yeniSiparis()">Yeni sipariş oluştur</button>
  </div>
</div>

<!-- ============ YÖNETİM: ŞİFRE ============ -->
<div id="gateView" class="gate hide">
  <div class="mark">G</div>
  <h2>Yönetim girişi</h2>
  <input id="pass" type="password" inputmode="numeric" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()" />
  <button class="btn" style="width:100%" onclick="girisYap()">Gir</button>
</div>

<!-- ============ YÖNETİM: PANEL ============ -->
<div id="adminView" class="wrap hide">
  <div class="adminhead">
    <div>
      <h1>Gülgün siparişleri</h1>
      <div class="cnt"><span id="newCount">0</span> yeni · canlı</div>
    </div>
    <button class="btn ghost sm" onclick="location.href='?'">Çıkış</button>
  </div>

  <div id="pushNote" class="pushnote hide">
    <span>Kapalıyken bildirim için izin gerekli.</span>
    <button class="btn sm" onclick="bildirimAyarla()">İzin ver</button>
  </div>

  <div class="filters" id="filters">
    <button class="chip on" data-f="all" onclick="setFilter(this)">Tümü</button>
    <button class="chip" data-f="yeni" onclick="setFilter(this)">Yeni</button>
    <button class="chip" data-f="onaylandi" onclick="setFilter(this)">Onaylı</button>
    <button class="chip" data-f="beklemede" onclick="setFilter(this)">Bekleyen</button>
  </div>

  <div id="orders"></div>
</div>

<script>
/* ============================================================
   1) FIREBASE AYARLARI  —  Günkâr projenin config'ini buraya yapıştır
   (Firebase Console › Proje Ayarları › Genel › Web uygulaması)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDQeCLGHQUxO0uQx42ypa4pqXuWOaWsI2I",
  authDomain: "gulgun-siparis.firebaseapp.com",
  projectId: "gulgun-siparis",
  storageBucket: "gulgun-siparis.firebasestorage.app",
  messagingSenderId: "936393876926",
  appId: "1:936393876926:web:3979b2869b7a7f717fc5ef"
};

/* Firebase Console › Cloud Messaging › Web Push sertifikaları › anahtar çifti */
const VAPID_KEY = "BCw8eF8mrZ5SjUsD2OjEnE3hPTyDWhTr3io2Vv1e2ZuyjizrZKroAyPyuIi6AFa3MPoBRCilNIR1h1YD8FGfEbs";

/* Yönetim şifresi (istediğinle değiştir) */
const ADMIN_SIFRE = "gunkar";

/* Ürünler — sonra buradan değiştir/çoğalt */
const PRODUCTS = ["10kg Halloumi Cheese","5kg Halloumi Cheese","Milba","Kaşar","Ürün 5","Ürün 6","Ürün 7"];
const BIRIM = "koli";
/* ============================================================ */

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let messaging = null;
try { messaging = firebase.messaging(); } catch(e){ /* desteklenmeyen tarayıcı */ }

const qty = {};
PRODUCTS.forEach(p => qty[p] = 0);

/* ---------- Sipariş ekranı ---------- */
function renderProducts(){
  const el = document.getElementById('prodList');
  el.innerHTML = PRODUCTS.map((p,i)=>`
    <div class="prod" id="prod-${i}">
      <div class="name">${p}<div class="unit">${BIRIM}</div></div>
      <div class="stepper">
        <button aria-label="azalt" onclick="chg(${i},-1)">−</button>
        <input id="q-${i}" type="number" min="0" value="0" inputmode="numeric"
               onchange="setQ(${i},this.value)" />
        <button aria-label="artır" onclick="chg(${i},1)">+</button>
      </div>
    </div>`).join('');
}
function chg(i,d){ setQ(i, (qty[PRODUCTS[i]]||0)+d); }
function setQ(i,v){
  let n = Math.max(0, parseInt(v)||0);
  qty[PRODUCTS[i]] = n;
  document.getElementById('q-'+i).value = n;
  document.getElementById('prod-'+i).classList.toggle('active', n>0);
  updateTotals();
}
function updateTotals(){
  let lines=0, total=0;
  PRODUCTS.forEach(p=>{ if(qty[p]>0){lines++; total+=qty[p];} });
  document.getElementById('totQty').textContent = total;
  document.getElementById('totLines').textContent = lines;
  document.getElementById('sendBtn').disabled = lines===0;
}

async function siparisGonder(){
  const items = PRODUCTS.filter(p=>qty[p]>0).map(p=>({urun:p, adet:qty[p]}));
  if(!items.length) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = "Gönderiliyor…";
  try{
    await db.collection('gulgun_siparisleri').add({
      items,
      not: document.getElementById('orderNote').value.trim(),
      status: 'yeni',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showReceipt(items, document.getElementById('orderNote').value.trim());
  }catch(e){
    btn.disabled=false; btn.textContent="Siparişi gönder";
    toast("Gönderilemedi — bağlantıyı kontrol et");
  }
}
function showReceipt(items, note){
  document.getElementById('receipt').innerHTML =
    items.map(it=>`<div class="row"><span>${it.urun}</span><span class="q">${it.adet} ${BIRIM}</span></div>`).join('') +
    (note?`<div class="row"><span style="color:var(--muted)">Not</span><span style="max-width:60%;text-align:right">${escapeHtml(note)}</span></div>`:'');
  document.getElementById('orderView').classList.add('hide');
  document.getElementById('orderBar').classList.add('hide');
  document.getElementById('doneView').classList.remove('hide');
  window.scrollTo(0,0);
}
function yeniSiparis(){
  PRODUCTS.forEach((p,i)=>setQ(i,0));
  document.getElementById('orderNote').value='';
  document.getElementById('doneView').classList.add('hide');
  document.getElementById('orderView').classList.remove('hide');
  document.getElementById('orderBar').classList.remove('hide');
}

/* ---------- Yönetim ---------- */
function girisYap(){
  if(document.getElementById('pass').value === ADMIN_SIFRE){
    sessionStorage.setItem('gk_admin','1');
    startAdmin();
  } else { toast("Şifre hatalı"); }
}
function startAdmin(){
  document.getElementById('gateView').classList.add('hide');
  document.getElementById('adminView').classList.remove('hide');
  listenOrders();
  if(messaging && Notification.permission!=='granted'){
    document.getElementById('pushNote').classList.remove('hide');
  } else if(messaging){ bildirimAyarla(); }
}

let currentFilter='all', allOrders=[];
function setFilter(el){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); currentFilter = el.dataset.f; renderOrders();
}
function listenOrders(){
  db.collection('gulgun_siparisleri').orderBy('createdAt','desc').limit(100)
    .onSnapshot(snap=>{
      allOrders = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderOrders();
    }, err=>{ toast("Veri okunamadı"); });
}
function renderOrders(){
  const list = currentFilter==='all' ? allOrders : allOrders.filter(o=>o.status===currentFilter);
  const newN = allOrders.filter(o=>o.status==='yeni').length;
  document.getElementById('newCount').textContent = newN;
  const wrap = document.getElementById('orders');
  if(!list.length){ wrap.innerHTML = `<div class="empty">Bu filtrede sipariş yok.</div>`; return; }
  wrap.innerHTML = list.map(o=>{
    const t = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate() : null;
    const time = t ? t.toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    const st = o.status||'yeni';
    const stLabel = {yeni:'Yeni',onaylandi:'Onaylandı',beklemede:'Beklemede',reddedildi:'Reddedildi'}[st];
    return `<div class="card ticket ${st}">
      <div class="stripe"></div>
      <div class="thead">
        <span class="oid">#${o.id.slice(-5).toUpperCase()}</span>
        <span class="otime">${time}</span>
        <span class="badge ${st}">${stLabel}</span>
      </div>
      <div class="lines">
        ${(o.items||[]).map(it=>`<div class="line"><span>${escapeHtml(it.urun)}</span><span class="q">${it.adet} ${BIRIM}</span></div>`).join('')}
      </div>
      ${o.not?`<div class="onote"><b>Not:</b> ${escapeHtml(o.not)}</div>`:''}
      <div class="acts">
        ${st!=='onaylandi'?`<button class="btn onay sm" onclick="setStatus('${o.id}','onaylandi')">Onayla</button>`:''}
        ${st!=='beklemede'?`<button class="btn beklet sm" onclick="setStatus('${o.id}','beklemede')">Beklet</button>`:''}
        ${st!=='reddedildi'?`<button class="btn ret sm" onclick="setStatus('${o.id}','reddedildi')">Reddet</button>`:''}
      </div>
    </div>`;
  }).join('');
}
async function setStatus(id,status){
  try{ await db.collection('gulgun_siparisleri').doc(id).update({status, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); }
  catch(e){ toast("Güncellenemedi"); }
}

/* ---------- Push kaydı ---------- */
async function bildirimAyarla(){
  if(!messaging){ toast("Bu tarayıcı bildirimi desteklemiyor"); return; }
  try{
    const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const perm = await Notification.requestPermission();
    if(perm!=='granted'){ toast("Bildirim izni verilmedi"); return; }
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
    if(token){
      await db.collection('push_tokens').doc(token).set({
        token, cihaz: navigator.userAgent.slice(0,80),
        ts: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('pushNote').classList.add('hide');
      toast("Bildirimler açık ✓");
    }
    messaging.onMessage(payload=>{
      const d = payload.data||payload.notification||{};
      toast("🔔 "+(d.title||"Yeni sipariş"));
    });
  }catch(e){ toast("Bildirim kurulamadı — Ana Ekrana ekli mi?"); }
}

/* ---------- yardımcı ---------- */
function toast(m){
  const t=document.createElement('div'); t.className='toast'; t.textContent=m;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---------- yönlendirme ---------- */
(function init(){
  renderProducts();
  const isAdmin = new URLSearchParams(location.search).get('admin')==='1';
  if(isAdmin){
    document.getElementById('orderView').classList.add('hide');
    document.getElementById('orderBar').classList.add('hide');
    if(sessionStorage.getItem('gk_admin')==='1'){ startAdmin(); }
    else { document.getElementById('gateView').classList.remove('hide'); }
  }
})();
</script>
</body>
</html>
